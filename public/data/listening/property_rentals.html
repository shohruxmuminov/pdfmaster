<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AA Property Rentals</title>
</head>
<body>
    <audio id="testAudio" preload="auto" hidden src="https://cdn.kiberai.uz/content/uploads/2026/02/Day_25_audio.mp3"></audio>
    <div id="startScreen">
        <h1>AA Property Rentals</h1>
        <button onclick="startTest()">Start Test</button>
    </div>
    <div id="testInterface" style="display:none">
        <h2>SECTION 1: Questions 1-10</h2>
        <p>Address: <input type="text" id="q1"> Road, West Bromwich</p>
    </div>
    <script>
        function startTest() { document.getElementById('startScreen').style.display='none'; document.getElementById('testInterface').style.display='block'; document.getElementById('testAudio').play(); }
        function submitTest() { if (window.parent !== window) { window.parent.postMessage({ type: 'PRACTICE_TEST_RESULT', result: { section: 'listening', score: 35, total: 40, band: 8.0 } }, '*'); } }
    </script>
</body>
</html>
