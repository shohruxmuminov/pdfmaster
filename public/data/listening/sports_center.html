<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Westfield Sports Center</title>
</head>
<body>
    <audio id="testAudio" preload="auto" hidden src="https://cdn.kiberai.uz/content/uploads/2026/01/DAY_15.mp3"></audio>
    <div id="startScreen">
        <h1>Westfield Sports Center</h1>
        <button onclick="startTest()">Start Test</button>
    </div>
    <div id="testInterface" style="display:none">
        <h2>SECTION 1: Questions 1-10</h2>
        <p>1. How long is the heated pool? <input type="radio" name="q1" value="A"> 15m</p>
    </div>
    <script>
        function startTest() { document.getElementById('startScreen').style.display='none'; document.getElementById('testInterface').style.display='block'; document.getElementById('testAudio').play(); }
        function submitTest() { if (window.parent !== window) { window.parent.postMessage({ type: 'PRACTICE_TEST_RESULT', result: { section: 'listening', score: 20, total: 40, band: 5.5 } }, '*'); } }
    </script>
</body>
</html>
