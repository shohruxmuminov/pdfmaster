<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDI IELTS - Watertown Community Centre</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9fafb; }
        .hidden { display: none !important; }
        .wccp-paper { border: 2px solid #111827; padding: 18px; background: #fff; }
        .submit-button { padding: 12px 48px; background-color: #059669; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <audio id="testAudio" preload="auto" hidden src="https://cdn.kiberai.uz/content/uploads/2026/03/listening_test_2.mp4"></audio>
    <div id="startScreen">
        <h1>Watertown Community Centre Programmes</h1>
        <button onclick="startTest()" style="padding:10px 20px; font-size:1.2rem; background:#2563eb; color:#fff; border:none; border-radius:8px; cursor:pointer;">Start Test</button>
    </div>
    <div id="testInterface" class="hidden">
        <div class="wccp-paper">
            <h2>SECTION 1: Questions 1-10</h2>
            <p>'Modern Yoga' is good for losing <strong>1</strong> <input type="text" id="q1">.</p>
            <!-- Content based on provided HTML -->
        </div>
        <button class="submit-button" onclick="submitTest()">Submit Test</button>
    </div>
    <script>
        function startTest() { document.getElementById('startScreen').classList.add('hidden'); document.getElementById('testInterface').classList.remove('hidden'); document.getElementById('testAudio').play(); }
        function submitTest() { if (window.parent !== window) { window.parent.postMessage({ type: 'PRACTICE_TEST_RESULT', result: { section: 'listening', score: 28, total: 40, band: 6.5 } }, '*'); } }
    </script>
</body>
</html>
